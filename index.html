<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanskrit Room Interactive</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #111;
  font-family: Arial;
}

#viewer {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  cursor: grab;
}

#scene {
  position: absolute;
  transform-origin: top left;
}

#scene img {
  width: 1664px;
  height: 936px;
  pointer-events: none;
}

/* ===== HOTSPOTS ===== */

#boardHotspot {
  position: absolute;
  left: 810px;
  top: 445px;
  width: 250px;
  height: 100px;
  z-index: 5;
}

#cartHotspot {
  position: absolute;
  left: 1290px;
  top: 700px;
  width: 230px;
  height: 130px;
  z-index: 20;
}

#maskHotspot {
  position: absolute;
  left: 1155px;
  top: 315px;
  width: 85px;
  height: 85px;
  z-index: 20;
}

#whistleHotspot {
  position: absolute;
  left: 1015px;
  top: 570px;
  width: 140px;
  height: 80px;
  z-index: 20;
}

#plateHotspot {
  position: absolute;
  left: 910px;
  top: 565px;
  width: 105px;
  height: 75px;
  z-index: 20;
}

#banglesHotspot {
  position: absolute;
  left: 35px;
  top: 705px;
  width: 240px;
  height: 110px;
  z-index: 20;
}

/* Make clickable */
#boardHotspot,
#cartHotspot,
#maskHotspot,
#whistleHotspot,
#plateHotspot,
#banglesHotspot {
  cursor: pointer;
}

/* ===== MODAL ===== */

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.panel {
  background: #2a1a0f;
  padding: 20px;
  border-radius: 15px;
  max-width: 90vw;
  max-height: 90vh;
  overflow: auto;
  text-align: center;
  color: #fff;
}

.closeBtn {
  float: right;
  cursor: pointer;
  padding: 8px 12px;
  background: #fff0b3;
  border: none;
  border-radius: 8px;
}

#artifactImage {
  width: 300px;
  margin: 15px 0;
  border-radius: 10px;
}

.listenBtn {
  margin: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #fff0b3;
}

</style>
</head>

<body>

<div id="viewer">
  <div id="scene">
    <img src="sanskrit_board.png">

    <div id="boardHotspot" onclick="openBoardModal()"></div>
    <div id="cartHotspot" onclick="openArtifactModal('cart')"></div>
    <div id="maskHotspot" onclick="openArtifactModal('mask')"></div>
    <div id="whistleHotspot" onclick="openArtifactModal('whistles')"></div>
    <div id="plateHotspot" onclick="openArtifactModal('plate')"></div>
    <div id="banglesHotspot" onclick="openArtifactModal('bangles')"></div>

  </div>
</div>

<!-- MODAL -->
<div id="artifactModal" class="modal">
  <div class="panel">
    <button class="closeBtn" onclick="closeArtifactModal()">Close</button>

    <img id="artifactImage">
    <br>

    <button class="listenBtn" onclick="speak()">🔊 Listen</button>

    <div id="artifactText"></div>
  </div>
</div>

<script>

let currentSpeech = "";

const artifacts = {

cart: {
image: "toy_cart.png",
speech: "क्रीडनक रथः",
text: `
<strong>Toy ox-drawn cart</strong><br>
क्रीडनक रथः (krīḍanaka rathaḥ)<br><br>
Used for transport and trade. Shows daily life of Indus people.
`
},

mask: {
image: "Terracotta_mask.png",
speech: "मृण्मय मुखावरणम्",
text: `
<strong>Terracotta mask</strong><br>
मृण्मय मुखावरणम् (mṛṇmaya mukhāvaraṇam)<br><br>
Terracotta masks (c. 2600 BCE) were likely used in rituals, performances, or ceremonies.<br>
They show artistic skills and cultural practices.
`
},

plate: {
image: "Copper_plate.png",
speech: "ताम्र पटलम्",
text: `
<strong>Copper plate</strong><br>
ताम्र पटलम् (tāmra paṭalam)<br><br>
Used for serving food. Shows metalworking skills.
`
},

bangles: {
image: "Copper_bangles.png",
speech: "ताम्र कङ्कणानि",
text: `
<strong>Copper bangles</strong><br>
ताम्र कङ्कणानि (tāmra kaṅkaṇāni)<br><br>
Worn as ornaments showing fashion and identity.
`
},

whistles: {
image: "Whistles.png",
speech: "क्रीडनक शृङ्गिका",
text: `
<strong>Whistles</strong><br>
क्रीडनक शृङ्गिका (krīḍanaka śṛṅgikā)<br><br>
Used for sound, play, or communication.
`
}

};

function openArtifactModal(type) {
  let item = artifacts[type];

  document.getElementById("artifactImage").src = item.image;
  document.getElementById("artifactText").innerHTML = item.text;
  currentSpeech = item.speech;

  document.getElementById("artifactModal").classList.add("active");
}

function closeArtifactModal() {
  document.getElementById("artifactModal").classList.remove("active");
}

function speak() {
  let msg = new SpeechSynthesisUtterance(currentSpeech);
  msg.lang = "hi-IN";
  speechSynthesis.speak(msg);
}

</script>

</body>
</html>
